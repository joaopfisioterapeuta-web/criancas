<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Nosso Corpo é um Tesouro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ícones amigáveis para a interface
        const SpeakerIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline-block animate-pulse"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        );

        const ShieldAlertIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="shrink-0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        );

        const HeartIcon = ({ filled }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`transition-all duration-300 ${filled ? 'scale-110 text-rose-500' : 'text-slate-300'}`}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        );

        const SparklesIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.32 11.32l.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path></svg>
        );

        const CheckIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-600"><polyline points="20 6 9 17 4 12"></polyline></svg>
        );

        // Base de dados com foco pedagógico em Português do Brasil (PT-BR)
        const zonesData = {
          green: [
            {
              id: "cabeca",
              title: "Cabeça e Cabelo 💇",
              message: "Fazer carinho na cabeça, pentear o cabelo ou dar um cafuné são carinhos muito legais! Mas lembre-se: se você não estiver com vontade, pode pedir para parar.",
              audio: "Fazer carinho na cabeça, pentear o cabelo ou dar um cafuné são carinhos muito legais! Mas lembre-se: se você não estiver com vontade, pode pedir para parar."
            },
            {
              id: "ombros",
              title: "Ombros e Braços 💪",
              message: "Dar as mãos, abraços apertados de amigos e um tapinha amigável no ombro para parabenizar são toques muito seguros e cheios de carinho!",
              audio: "Dar as mãos, abraços apertados de amigos e um tapinha amigável no ombro para parabenizar são toques muito seguros e cheios de carinho!"
            },
            {
              id: "maosPes",
              title: "Mãos e Pés 🖐️",
              message: "Bater cinco, fazer cócegas no pé ou segurar a mão para atravessar a rua em segurança são toques muito normais, protetores e cheios de afeto!",
              audio: "Bater cinco, fazer cócegas no pé ou segurar a mão para atravessar a rua em segurança são toques muito normais, protetores e cheios de afeto!"
            }
          ],
          yellow: [
            {
              id: "barriga",
              title: "Barriga 🧸",
              message: "Sinal de Atenção! Brincadeiras de cócegas ou toques na barriguinha só valem se você estiver achando divertido. Se começar a incomodar ou deixar você desconfortável, peça para parar na hora.",
              audio: "Sinal de Atenção! Brincadeiras de cócegas ou toques na barriguinha só valem se você estiver achando divertido. Se começar a incomodar ou deixar você desconfortável, peça para parar na hora."
            },
            {
              id: "pernas",
              title: "Pernas e Coxas 🦵",
              message: "Sinal de Atenção! Tocar nas suas pernas ou coxas pode parecer estranho ou desconfortável. Você tem todo o direito de falar 'não quero' ou se afastar se alguém tocar aí sem sua permissão.",
              audio: "Sinal de Atenção! Tocar nas suas pernas ou coxas pode parecer estranho ou desconfortável. Você tem todo o direito de falar não quero ou se afastar se alguém tocar aí sem sua permissão."
            }
          ],
          red: [
            {
              id: "boca",
              title: "Boca 👄",
              message: "A boca é uma parte muito íntima. Ninguém pode te obrigar a dar beijos ou a deixar que toquem na sua boca. Beijinho no rosto de quem você gosta e confia é o ideal!",
              audio: "A boca é uma parte muito íntima. Ninguém pode te obrigar a dar beijos ou a deixar que toquem na sua boca. Beijinho no rosto de quem você gosta e confia é o ideal!"
            },
            {
              id: "peito",
              title: "Peito e Tórax 👕",
              message: "Área vermelha de perigo! Ninguém deve tocar no seu peito. É uma parte do corpo protegida pela sua camiseta ou roupa de banho, e só deve ser tocada por médicos em exames ou pelos pais para ajudar no banho.",
              audio: "Área vermelha de perigo! Ninguém deve tocar no seu peito. É uma parte do corpo protegida pela sua camiseta ou roupa de banho, e só deve ser tocada por médicos em exames ou pelos pais para ajudar no banho."
            },
            {
              id: "partesIntimas",
              title: "Partes Íntimas 🩲",
              message: "ÁREA MUITO RESERVADA! Ninguém, absolutamente ninguém, pode tocar nas suas partes íntimas (onde fica a calcinha ou a cueca), nem pedir para você tocar nas deles. Apenas a mamãe, o papai ou o médico quando você precisar de ajuda para se limpar ou em uma consulta médica.",
              audio: "Área muito reservada! Ninguém pode tocar nas suas partes íntimas, onde fica a calcinha ou a cueca, nem pedir para você ver ou tocar neles. É uma regra de proteção muito importante!"
            }
          ]
        };

        const quizQuestions = [
          {
            question: "Um colega da escola quer te cumprimentar com um 'toca aqui' (bater as mãos). Isso é seguro?",
            options: [
              { text: "Sim! É um toque verde (amigável e seguro).", isCorrect: true },
              { text: "Não, ninguém pode tocar nas minhas mãos.", isCorrect: false }
            ],
            explanation: "Isso mesmo! Cumprimentar os amigos com as mãos é um toque muito saudável, alegre e amigável."
          },
          {
            question: "Um adulto pede para você guardar um segredo sobre um toque que te deixou desconfortável ou triste. O que você deve fazer?",
            options: [
              { text: "Guardar o segredo porque prometi.", isCorrect: false },
              { text: "Não guardar o segredo e contar imediatamente para um adulto de confiança!", isCorrect: true }
            ],
            explanation: "Perfeito! Segredos que nos deixam tristes, assustados ou desconfortáveis NUNCA devem ser guardados. Conte para um adulto que te proteja."
          },
          {
            question: "Alguém tenta tocar na região coberta pela sua roupa íntima (calcinha ou cueca). O que fazer?",
            options: [
              { text: "Dizer NÃO bem alto, sair de perto e contar para um adulto de confiança.", isCorrect: true },
              { text: "Ficar quietinho com medo de levar bronca.", isCorrect: false }
            ],
            explanation: "Exatamente! Seu corpo é seu tesouro. Se alguém tentar tocar ali, grite NÃO, corra e conte para quem você confia. A culpa nunca é sua!"
          }
        ];

        // Efeitos sonoros via Web Audio API
        const playSound = (type) => {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if (type === 'click') {
              osc.frequency.setValueAtTime(450, ctx.currentTime);
              osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
              gain.gain.setValueAtTime(0.06, ctx.currentTime);
              gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.1);
              osc.start();
              osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'correct') {
              osc.type = 'triangle';
              osc.frequency.setValueAtTime(523.25, ctx.currentTime);
              osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08);
              osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16);
              gain.gain.setValueAtTime(0.1, ctx.currentTime);
              gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.28);
              osc.start();
              osc.stop(ctx.currentTime + 0.28);
            } else if (type === 'incorrect') {
              osc.type = 'sawtooth';
              osc.frequency.setValueAtTime(220, ctx.currentTime);
              osc.frequency.linearRampToValueAtTime(130, ctx.currentTime + 0.22);
              gain.gain.setValueAtTime(0.06, ctx.currentTime);
              gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.22);
              osc.start();
              osc.stop(ctx.currentTime + 0.22);
            } else if (type === 'success') {
              osc.type = 'sine';
              const scale = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
              scale.forEach((freq, idx) => {
                osc.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.05);
              });
              gain.gain.setValueAtTime(0.1, ctx.currentTime);
              gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.6);
              osc.start();
              osc.stop(ctx.currentTime + 0.6);
            }
          } catch (e) {}
        };

        function App() {
          const combinedImageUrl = "https://i.postimg.cc/wjD49LQg/IMG-4790.jpg";
          
          const [activeTab, setActiveTab] = useState('green');
          const [selectedItem, setSelectedItem] = useState(zonesData.green[0]);
          const [tab, setTab] = useState('interactive'); 
          const [quizIndex, setQuizIndex] = useState(0);
          const [selectedOption, setSelectedOption] = useState(null);
          const [showExplanation, setShowExplanation] = useState(false);
          const [quizScore, setQuizScore] = useState(0);
          const [networkAdults, setNetworkAdults] = useState(["", "", ""]);
          const [speechSupported, setSpeechSupported] = useState(false);
          const [isSpeaking, setIsSpeaking] = useState(false);

          useEffect(() => {
            if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
              setSpeechSupported(true);
            }
          }, []);

          const handleCategoryChange = (category) => {
            playSound('click');
            setActiveTab(category);
            setSelectedItem(zonesData[category][0]);
            if (speechSupported) {
              window.speechSynthesis.cancel();
              setIsSpeaking(false);
            }
          };

          const handleItemSelect = (item) => {
            playSound('click');
            setSelectedItem(item);
            if (speechSupported) {
              window.speechSynthesis.cancel();
              setIsSpeaking(false);
            }
          };

          const speakText = (text) => {
            if (!speechSupported) return;
            if (isSpeaking) {
              window.speechSynthesis.cancel();
              setIsSpeaking(false);
              return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 0.95;
            utterance.onend = () => setIsSpeaking(false);
            utterance.onerror = () => setIsSpeaking(false);
            setIsSpeaking(true);
            window.speechSynthesis.speak(utterance);
          };

          const handleOptionSelect = (index, isCorrect) => {
            setSelectedOption(index);
            setShowExplanation(true);
            if (isCorrect) {
              playSound('correct');
              setQuizScore(prev => prev + 1);
            } else {
              playSound('incorrect');
            }
          };

          const nextQuestion = () => {
            playSound('click');
            setSelectedOption(null);
            setShowExplanation(false);
            if (quizIndex < quizQuestions.length - 1) {
              setQuizIndex(prev => prev + 1);
            } else {
              playSound('success');
              setQuizIndex(quizQuestions.length);
            }
          };

          const resetQuiz = () => {
            playSound('click');
            setQuizIndex(0);
            setSelectedOption(null);
            setShowExplanation(false);
            setQuizScore(0);
          };

          const handleAdultNameChange = (index, value) => {
            const updated = [...networkAdults];
            updated[index] = value;
            setNetworkAdults(updated);
          };

          return (
            <div className="min-h-screen bg-gradient-to-b from-sky-50 via-indigo-50/20 to-emerald-50/30 text-slate-800 font-sans pb-16 antialiased selection:bg-indigo-100">
              
              {/* Banner de Segurança */}
              <div className="bg-rose-500 text-white py-3 px-4 text-center text-xs md:text-sm font-semibold shadow-md flex items-center justify-center gap-2 relative z-50">
                <ShieldAlertIcon />
                <span>Espaço Seguro: Ensino de forma leve sobre limites e privacidade corporal para crianças.</span>
              </div>

              {/* Cabeçalho */}
              <header className="max-w-4xl mx-auto pt-8 md:pt-14 px-6 text-center space-y-4">
                <div className="inline-flex items-center gap-2 bg-indigo-100/80 text-indigo-800 px-4 py-1.5 rounded-full text-xs font-bold uppercase shadow-sm">
                  <span className="animate-bounce">✨</span> Meu Corpo, Minhas Regras
                </div>
                <h1 className="text-3xl md:text-5xl font-extrabold text-slate-900 tracking-tight leading-tight">
                  O Nosso Corpo é um Tesouro 🤍
                </h1>
                <p className="text-sm md:text-base text-slate-600 max-w-2xl mx-auto leading-relaxed font-medium">
                  As regras de proteção ajudam a nos manter seguros! Explore os sinais do semáforo abaixo para descobrir quais toques são seguros e quais são proibidos.
                </p>

                {/* Abas */}
                <div className="max-w-md mx-auto bg-white/80 backdrop-blur-md p-1.5 rounded-2xl border border-slate-200/60 flex gap-1 shadow-md mt-8">
                  <button
                    onClick={() => { playSound('click'); setTab('interactive'); }}
                    className={`flex-1 py-3 px-2 rounded-xl font-bold text-xs md:text-sm transition-all duration-300 flex items-center justify-center gap-1.5 ${
                      tab === 'interactive' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:text-slate-800 hover:bg-slate-100/50'
                    }`}
                  >
                    <span>🧑‍🦱</span> Semáforo do Corpo
                  </button>
                  <button
                    onClick={() => { playSound('click'); setTab('quiz'); }}
                    className={`flex-1 py-3 px-2 rounded-xl font-bold text-xs md:text-sm transition-all duration-300 flex items-center justify-center gap-1.5 ${
                      tab === 'quiz' ? 'bg-amber-500 text-white shadow-lg' : 'text-slate-600 hover:text-slate-800 hover:bg-slate-100/50'
                    }`}
                  >
                    <span>🎮</span> Quiz Protetor
                  </button>
                  <button
                    onClick={() => { playSound('click'); setTab('parents'); }}
                    className={`flex-1 py-3 px-2 rounded-xl font-bold text-xs md:text-sm transition-all duration-300 flex items-center justify-center gap-1.5 ${
                      tab === 'parents' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-600 hover:text-slate-800 hover:bg-slate-100/50'
                    }`}
                  >
                    <span>👨‍👩‍👧</span> Guia Adulto
                  </button>
                </div>
              </header>

              <main className="max-w-5xl mx-auto px-4 md:px-6 mt-10">
                
                {/* SEMÁFORO INTERATIVO */}
                {tab === 'interactive' && (
                  <div className="space-y-8 animate-fade-in">
                    
                    {/* Vídeo Educativo */}
                    <div className="w-full bg-white rounded-3xl p-5 md:p-7 shadow-xl shadow-slate-200/20 border border-slate-150">
                      <h3 className="text-sm font-extrabold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <span>🎥</span> Assista ao vídeo educativo de introdução
                      </h3>
                      <div className="relative w-full aspect-video rounded-2xl overflow-hidden bg-slate-900 shadow-inner border border-slate-100">
                        <video 
                          src="video-introducao.mp4.mov" 
                          controls 
                          className="w-full h-full object-cover"
                          poster="https://images.unsplash.com/photo-1516627145497-ae6968895b74?q=80&w=1200&auto=format&fit=crop"
                        >
                          Seu navegador não suporta a reprodução deste vídeo educativo.
                        </video>
                      </div>
                    </div>

                    {/* Semáforo e Bonecos */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch">
                      
                      {/* Ilustração Esquerda */}
                      <div className="lg:col-span-5 bg-white rounded-3xl p-5 md:p-6 shadow-xl shadow-slate-200/20 border border-slate-100 flex flex-col justify-center items-center relative">
                        <h3 className="text-sm font-black text-slate-800 uppercase tracking-wider mb-3">
                          👫 Nossos Amiguinhos Sofia e Lucas
                        </h3>
                        <div className="w-full rounded-2xl border border-slate-100 shadow-inner overflow-hidden max-w-[340px] md:max-w-full">
                          <img 
                            src={combinedImageUrl} 
                            alt="Desenho de Sofia e Lucas" 
                            className="w-full h-auto block select-none pointer-events-none" 
                          />
                        </div>
                        <p className="text-xs text-slate-400 mt-4 text-center font-semibold">
                          Ilustração de referência do corpo humano e zonas de privacidade.
                        </p>
                      </div>

                      {/* Painel de Escolhas Direito */}
                      <div className="lg:col-span-7 flex flex-col justify-between bg-white rounded-3xl p-5 md:p-8 shadow-xl shadow-slate-200/20 border border-slate-100 space-y-6">
                        
                        <div className="space-y-3">
                          <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider text-left">
                            🚦 Escolha um sinal do Semáforo:
                          </h3>
                          
                          <div className="grid grid-cols-3 gap-3">
                            <button
                              onClick={() => handleCategoryChange('green')}
                              className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all outline-none ${
                                activeTab === 'green'
                                  ? 'border-emerald-500 bg-emerald-50 text-emerald-950 shadow-md scale-105'
                                  : 'border-slate-100 bg-slate-50 text-slate-650 hover:bg-slate-100/50'
                              }`}
                            >
                              <span className="text-3xl mb-1">🟢</span>
                              <span className="font-extrabold text-xs md:text-sm">Toque Verde</span>
                              <span className="text-[10px] opacity-75 font-semibold">Livre e Seguro</span>
                            </button>

                            <button
                              onClick={() => handleCategoryChange('yellow')}
                              className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all outline-none ${
                                activeTab === 'yellow'
                                  ? 'border-amber-400 bg-amber-50 text-amber-950 shadow-md scale-105'
                                  : 'border-slate-100 bg-slate-50 text-slate-650 hover:bg-slate-100/50'
                              }`}
                            >
                              <span className="text-3xl mb-1">🟡</span>
                              <span className="font-extrabold text-xs md:text-sm">Atenção</span>
                              <span className="text-[10px] opacity-75 font-semibold">Cuidado</span>
                            </button>

                            <button
                              onClick={() => handleCategoryChange('red')}
                              className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all outline-none ${
                                activeTab === 'red'
                                  ? 'border-rose-500 bg-rose-50 text-rose-950 shadow-md scale-105'
                                  : 'border-slate-100 bg-slate-50 text-slate-650 hover:bg-slate-100/50'
                              }`}
                            >
                              <span className="text-3xl mb-1">🔴</span>
                              <span className="font-extrabold text-xs md:text-sm">Área Vermelha</span>
                              <span className="text-[10px] opacity-75 font-semibold">Proibido!</span>
                            </button>
                          </div>
                        </div>

                        <div className="space-y-2">
                          <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest text-left">
                            Partes do Corpo para Explorar:
                          </h4>
                          <div className="flex flex-wrap gap-2">
                            {zonesData[activeTab].map((item) => (
                              <button
                                key={item.id}
                                onClick={() => handleItemSelect(item)}
                                className={`px-4 py-2.5 rounded-xl border font-bold text-xs transition-all outline-none flex items-center gap-1.5 ${
                                  selectedItem?.id === item.id
                                    ? activeTab === 'green' ? 'bg-emerald-500 text-white border-emerald-500 shadow-md' :
                                      activeTab === 'yellow' ? 'bg-amber-400 text-slate-900 border-amber-400 shadow-md' :
                                      'bg-rose-500 text-white border-rose-500 shadow-md'
                                    : 'bg-slate-50 text-slate-700 hover:bg-slate-100 border-slate-200'
                                }`}
                              >
                                {selectedItem?.id === item.id && <CheckIcon />}
                                {item.title}
                              </button>
                            ))}
                          </div>
                        </div>

                        {selectedItem && (
                          <div className={`rounded-2xl p-5 md:p-6 shadow-md border-t-8 transition-all duration-300 text-left ${
                            activeTab === 'green' ? 'bg-emerald-50/50 border-emerald-500' :
                            activeTab === 'yellow' ? 'bg-amber-50/60 border-amber-400' : 'bg-rose-50/50 border-rose-500'
                          }`}>
                            <div className="flex justify-between items-center mb-2">
                              <h4 className="text-base md:text-lg font-black text-slate-900">
                                {selectedItem.title}
                              </h4>
                              {speechSupported && (
                                <button
                                  onClick={() => speakText(selectedItem.audio)}
                                  className={`text-white p-2.5 rounded-full shadow-md active:scale-90 transition-all ${
                                    isSpeaking ? 'bg-rose-500 animate-pulse' : 'bg-indigo-600 hover:bg-indigo-700'
                                  }`}
                                >
                                  <SpeakerIcon />
                                </button>
                              )}
                            </div>
                            <p className="text-xs md:text-sm leading-relaxed text-slate-700 font-medium">
                              {selectedItem.message}
                            </p>
                          </div>
                        )}

                      </div>
                    </div>

                    {/* Regras e Rede de Apoio */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">
                      <div className="bg-slate-900 text-white rounded-3xl p-6 md:p-8 shadow-xl space-y-5 text-left">
                        <div>
                          <h3 className="text-lg font-black text-amber-300 flex items-center gap-2">
                            🛡️ Regra de Ouro da Proteção
                          </h3>
                          <p className="text-xs text-slate-300 mt-1 font-medium">
                            Se alguém tentar tocar em você e você se sentir desconfortável ou com medo, siga estes **3 passos**:
                          </p>
                        </div>
                        
                        <div className="space-y-3">
                          <div className="flex gap-4 items-start bg-white/5 p-4 rounded-2xl border border-white/5">
                            <span className="w-8 h-8 bg-rose-500 text-white rounded-full flex items-center justify-center font-black shrink-0 text-sm animate-pulse">1</span>
                            <div className="space-y-0.5">
                              <p className="font-extrabold text-sm text-white">Diga NÃO bem alto!</p>
                              <p className="text-xs text-slate-300">Ninguém tem o direito de tocar no seu corpo sem a sua autorização e carinho de verdade.</p>
                            </div>
                          </div>

                          <div className="flex gap-4 items-start bg-white/5 p-4 rounded-2xl border border-white/5">
                            <span className="w-8 h-8 bg-amber-500 text-white rounded-full flex items-center justify-center font-black shrink-0 text-sm">2</span>
                            <div className="space-y-0.5">
                              <p className="font-extrabold text-sm text-white">Corra para longe!</p>
                              <p className="text-xs text-slate-300">Fuja rapidamente para perto de outras pessoas ou para um lugar seguro.</p>
                            </div>
                          </div>

                          <div className="flex gap-4 items-start bg-white/5 p-4 rounded-2xl border border-white/5">
                            <span className="w-8 h-8 bg-emerald-500 text-white rounded-full flex items-center justify-center font-black shrink-0 text-sm">3</span>
                            <div className="space-y-0.5">
                              <p className="font-extrabold text-sm text-white">Conte para alguém de confiança!</p>
                              <p className="text-xs text-slate-300">Converse com a mamãe, com o papai ou professores. Um segredo que machuca ou assusta nunca deve ser guardado.</p>
                            </div>
                          </div>
                        </div>
                      </div>

                      <div className="bg-white rounded-3xl p-6 md:p-8 shadow-md border border-slate-100 flex flex-col justify-between text-left">
                        <div>
                          <h3 className="text-lg font-black text-slate-900 flex items-center gap-2">
                            🏡 Minha Rede de Apoio
                          </h3>
                          <p className="text-xs text-slate-500 leading-relaxed mt-1 font-medium">
                            Escreva abaixo o nome de 3 adultos protetores com quem você pode conversar sempre que precisar:
                          </p>
                        </div>

                        <div className="space-y-3 pt-4">
                          {networkAdults.map((adult, idx) => (
                            <div key={idx} className="flex items-center gap-3">
                              <HeartIcon filled={adult.trim().length > 0} />
                              <input
                                type="text"
                                placeholder={`Adulto de confiança ${idx + 1}`}
                                value={adult}
                                onChange={(e) => handleAdultNameChange(idx, e.target.value)}
                                className="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white rounded-xl px-4 py-2.5 text-sm font-semibold outline-none transition-all placeholder:text-slate-400"
                              />
                            </div>
                          ))}
                        </div>

                        {networkAdults.some(name => name.trim().length > 0) ? (
                          <div className="mt-4 bg-emerald-50 border border-emerald-100 text-emerald-800 text-xs py-3 px-4 rounded-xl font-bold text-center">
                            🌟 Excelente! Lembre-se de que estas pessoas estão aqui para te apoiar e ouvir!
                          </div>
                        ) : (
                          <div className="mt-4 h-12" />
                        )}
                      </div>
                    </div>

                  </div>
                )}

                {/* QUIZ INTERATIVO */}
                {tab === 'quiz' && (
                  <div className="max-w-2xl mx-auto bg-white rounded-3xl p-6 md:p-8 shadow-xl border border-slate-100 animate-fade-in">
                    <div className="text-center mb-8 space-y-2">
                      <span className="text-4xl block">🎮</span>
                      <h2 className="text-2xl font-black text-slate-950">Desafio do Guardião!</h2>
                      <p className="text-slate-500 text-sm max-w-md mx-auto font-medium">
                        Responda às perguntas e prove que você já entende sobre o semáforo do corpo!
                      </p>
                    </div>

                    {quizIndex < quizQuestions.length ? (
                      <div className="space-y-6 text-left">
                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                          <div 
                            className="bg-amber-500 h-full transition-all duration-500" 
                            style={{ width: `${((quizIndex + 1) / quizQuestions.length) * 100}%` }}
                          ></div>
                        </div>

                        <div>
                          <span className="text-[10px] font-extrabold text-amber-600 uppercase tracking-widest bg-amber-50 px-3 py-1 rounded-full">Situação {quizIndex + 1} de {quizQuestions.length}</span>
                          <h3 className="text-lg md:text-xl font-bold text-slate-900 mt-3 leading-relaxed">
                            {quizQuestions[quizIndex].question}
                          </h3>
                        </div>

                        <div className="space-y-3 pt-2">
                          {quizQuestions[quizIndex].options.map((opt, idx) => (
                            <button
                              key={idx}
                              disabled={showExplanation}
                              onClick={() => handleOptionSelect(idx, opt.isCorrect)}
                              className={`w-full text-left p-4 rounded-2xl border-2 font-semibold transition-all text-sm md:text-base flex justify-between items-center outline-none ${
                                selectedOption === null 
                                  ? 'border-slate-100 bg-slate-50 hover:border-amber-400 hover:bg-amber-50/20' 
                                  : selectedOption === idx
                                    ? opt.isCorrect ? 'border-emerald-500 bg-emerald-50 text-emerald-900 font-bold' : 'border-rose-500 bg-rose-50 text-rose-900'
                                    : opt.isCorrect ? 'border-emerald-500 bg-emerald-50 text-emerald-900 font-bold' : 'border-slate-50 bg-white opacity-60'
                              }`}
                            >
                              <span>{opt.text}</span>
                              {selectedOption !== null && opt.isCorrect && (
                                <span className="text-emerald-600 text-xs font-black bg-emerald-100 px-2.5 py-1 rounded-full">Correto!</span>
                              )}
                              {selectedOption === idx && !opt.isCorrect && (
                                <span className="text-rose-600 text-xs font-black bg-rose-100 px-2.5 py-1 rounded-full">Atenção!</span>
                              )}
                            </button>
                          ))}
                        </div>

                        {showExplanation && (
                          <div className="mt-6 bg-slate-50 border-l-4 border-amber-500 rounded-r-2xl p-5 space-y-4">
                            <div>
                              <p className="text-xs font-extrabold text-amber-700 uppercase tracking-wide">Por que essa resposta?</p>
                              <p className="text-slate-700 text-sm mt-1.5 leading-relaxed font-medium">
                                {quizQuestions[quizIndex].explanation}
                              </p>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row gap-3 justify-between items-stretch sm:items-center pt-2">
                              {speechSupported ? (
                                <button
                                  onClick={() => speakText(quizQuestions[quizIndex].explanation)}
                                  className={`text-xs font-bold flex items-center justify-center gap-1.5 py-2 ${
                                    isSpeaking ? 'text-rose-600' : 'text-indigo-600'
                                  }`}
                                >
                                  <SpeakerIcon /> {isSpeaking ? "Parar leitura" : "Ouvir explicação"}
                                </button>
                              ) : <div />}

                              <button
                                onClick={nextQuestion}
                                className="bg-amber-500 hover:bg-amber-600 text-white font-black px-6 py-3 rounded-xl text-sm shadow-md transition-all flex items-center justify-center active:scale-95"
                              >
                                <span>{quizIndex < quizQuestions.length - 1 ? 'Próxima ➔' : 'Ver Resultados ➔'}</span>
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    ) : (
                      <div className="text-center py-8 space-y-6">
                        <span className="text-6xl block animate-bounce">🏆</span>
                        <div className="space-y-1">
                          <h3 className="text-2xl font-black text-slate-900">Desafio Concluído!</h3>
                          <p className="text-slate-500 text-sm font-medium">
                            Você acertou <strong className="text-indigo-600 font-extrabold">{quizScore} de {quizQuestions.length}</strong> situações fundamentais!
                          </p>
                        </div>

                        <div className="bg-emerald-50 border border-emerald-150 rounded-2xl p-5 max-w-md mx-auto space-y-2">
                          <p className="font-extrabold text-emerald-800 text-base">🎖️ Guardião Certificado!</p>
                          <p className="text-emerald-700 text-xs leading-relaxed font-medium">
                            Você sabe muito bem como agir e impor limites seguros no seu corpo. Converse sempre com adultos protetores de sua confiança!
                          </p>
                        </div>

                        <button
                          onClick={resetQuiz}
                          className="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-8 py-3 rounded-full transition-all shadow-lg active:scale-95"
                        >
                          Jogar Novamente 🔄
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* CONSELHOS ADULTOS */}
                {tab === 'parents' && (
                  <div className="space-y-8 max-w-3xl mx-auto animate-fade-in text-left">
                    <div className="bg-white rounded-3xl p-6 md:p-8 shadow-lg border border-slate-100 space-y-6">
                      <div className="space-y-2">
                        <h2 className="text-xl md:text-2xl font-black text-slate-900 flex items-center gap-2">
                          👨‍👩‍👧 Espaço para Cuidadores, Pais e Educadores
                        </h2>
                        <p className="text-slate-500 text-sm leading-relaxed font-medium">
                          Utilizar uma ferramenta lúdica visual facilita o diálogo sobre privacidade corporal e ajuda a estabelecer limites necessários com os pequenos de modo respeitoso e prático.
                        </p>
                      </div>

                      <div className="space-y-4 pt-2">
                        <h3 className="text-sm font-black text-indigo-950 uppercase tracking-wider bg-indigo-50 px-3 py-1.5 rounded-lg inline-block">Conselhos Práticos de Comunicação:</h3>
                        
                        <ul className="grid grid-cols-1 gap-4 text-slate-700 text-sm leading-relaxed">
                          <li className="flex items-start gap-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span className="text-emerald-500 font-bold shrink-0 text-lg">✔</span>
                            <div>
                              <strong className="text-slate-900 block mb-0.5">Utilize os nomes anatômicos corretos:</strong> 
                              Evite apelidos confusos ou biologia infantilizada. Chamar as partes do corpo pelos nomes reais dá maior poder de clareza para a criança relatar qualquer acontecimento suspeito aos pais.
                            </div>
                          </li>
                          <li className="flex items-start gap-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span className="text-emerald-500 font-bold shrink-0 text-lg">✔</span>
                            <div>
                              <strong className="text-slate-900 block mb-0.5">Explique a diferença entre segredos bons e ruins:</strong> 
                              Ensine à criança: segredos bons trazem alegria e surpresas amigáveis (como um aniversário surpresa), enquanto os ruins geram medo, aflição, vergonha ou culpa. Estes últimos nunca devem ser guardados!
                            </div>
                          </li>
                          <li className="flex items-start gap-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span className="text-emerald-500 font-bold shrink-0 text-lg">✔</span>
                            <div>
                              <strong className="text-slate-950 block mb-0.5">Respeite a autonomia e o consentimento:</strong> 
                              Não force a criança a abraçar ou beijar pessoas se ela não quiser. Mostre a ela que ela é dona do próprio corpo e pode decidir como prefere cumprimentar os outros (um aceno, um 'toca aqui' ou um sorriso).
                            </div>
                          </li>
                        </ul>
                      </div>
                    </div>

                    {/* Denúncias */}
                    <div className="bg-rose-50/80 border border-rose-200 rounded-3xl p-6 md:p-8 shadow-md space-y-6">
                      <div className="space-y-2">
                        <h3 className="text-lg md:text-xl font-black text-rose-950 flex items-center gap-2">
                          🚨 Como agir diante de desabafos ou suspeitas?
                        </h3>
                        <p className="text-slate-700 text-sm leading-relaxed font-medium">
                          Se uma criança quebrar o silêncio, escute com calma e sem expressar broncas, pânico ou julgamentos. Acolha-a e garanta segurança emocional imediata. Diga: <strong>"Eu acredito em você, você fez o certo em me contar e agora você está em total segurança."</strong>
                        </p>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-white p-5 rounded-2xl border border-rose-100 shadow-sm flex flex-col justify-between space-y-4">
                          <div className="space-y-1.5">
                            <h4 className="font-extrabold text-sm md:text-base text-rose-900">📞 Disque 100</h4>
                            <p className="text-xs text-slate-500 leading-relaxed font-medium">
                              O canal nacional de Direitos Humanos é gratuito, anônimo, funciona todos os dias, 24 horas por dia, e acolhe e direciona denúncias contra a infância.
                            </p>
                          </div>
                          <a href="tel:100" className="bg-rose-600 hover:bg-rose-700 text-white text-center py-3 rounded-xl font-bold text-xs transition-all block">
                            Discar Disque 100
                          </a>
                        </div>

                        <div className="bg-white p-5 rounded-2xl border border-rose-100 shadow-sm flex flex-col justify-between space-y-4">
                          <div className="space-y-1.5">
                            <h4 className="font-extrabold text-sm md:text-base text-slate-800">🏢 Conselho Tutelar</h4>
                            <p className="text-xs text-slate-500 leading-relaxed font-medium">
                              O conselho tutelar do seu município é o órgão local encarregado de intervir e aplicar as medidas legais imediatas de proteção à criança e ao adolescente.
                            </p>
                          </div>
                          <div className="text-center bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-xs">
                            Localize a unidade mais próxima
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </main>

              {/* Rodapé */}
              <footer className="max-w-4xl mx-auto mt-16 px-6 border-t border-slate-200 pt-8 text-center text-xs text-slate-400 space-y-1 font-semibold">
                <p>Apoio Pedagógico para a Prevenção do Abuso e Proteção à Infância.</p>
                <p>Porque as crianças e os seus corpos são tesouros que devemos cuidar todos os dias.</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
